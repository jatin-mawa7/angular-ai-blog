<section class="contact-wrapper">
  <div class="contact-card">
    <h1>Contact Us</h1>

    <form #contactForm="ngForm" (ngSubmit)="onSubmit(contactForm)" novalidate>

      <!-- Row 1: Name & Email -->
      <div class="form-row">
        <div>
          <label for="name">Name</label>
          <input type="text" id="name" name="name" [(ngModel)]="formData.name"
                 required minlength="2" maxlength="80" #name="ngModel">
          <span class="error-text" *ngIf="name.invalid && name.touched">
            Please enter your name (2+ characters).
          </span>
        </div>

        <div>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" [(ngModel)]="formData.email"
                 required email #email="ngModel">
          <span class="error-text" *ngIf="email.invalid && email.touched">
            Please enter a valid email address.
          </span>
        </div>
      </div>

      <!-- Row 2: Subject -->
      <div class="form-row">
        <div style="grid-column: 1 / -1;">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" [(ngModel)]="formData.subject"
                 required minlength="3" maxlength="120" #subject="ngModel">
          <span class="error-text" *ngIf="subject.invalid && subject.touched">
            Please enter a subject (3–120 characters).
          </span>
        </div>
      </div>

      <!-- Row 3: Message -->
      <div class="form-row">
        <div style="grid-column: 1 / -1;">
          <label for="message">Message</label>
          <textarea id="message" name="message" [(ngModel)]="formData.message"
                    required minlength="10" maxlength="1000" #message="ngModel"></textarea>
          <span class="error-text" *ngIf="message.invalid && message.touched">
            Please enter a message (10–1000 characters).
          </span>
        </div>
      </div>

      <!-- Submit Button -->
      <div class="contact-actions">
        <button type="submit" [disabled]="contactForm.invalid">Send Message</button>
      </div>
    </form>

    <p class="alert alert-success mt-3" *ngIf="formSubmitted">
      ✅ Message submitted successfully!
    </p>
  </div>
</section>
